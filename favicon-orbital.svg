<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#g3)"/>
  <!-- p-orbital (two lobes) + node -->
  <g transform="translate(32,32)">
    <!-- positive lobe -->
    <ellipse cx="0" cy="-12" rx="10" ry="14" fill="#4fc1ff" opacity="0.7"/>
    <!-- negative lobe -->
    <ellipse cx="0" cy="12" rx="10" ry="14" fill="#ff6b6b" opacity="0.7"/>
    <!-- nodal plane -->
    <line x1="-16" y1="0" x2="16" y2="0" stroke="#fff" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.5"/>
    <!-- nucleus -->
    <circle r="2.5" fill="#ffd93d"/>
  </g>
</svg>
