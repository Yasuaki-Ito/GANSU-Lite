<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d3436"/>
      <stop offset="100%" stop-color="#1e272e"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#g4)"/>
  <!-- H2O molecule: O center, 2 H atoms, bonds -->
  <g transform="translate(32,30)">
    <!-- bonds -->
    <line x1="0" y1="0" x2="-14" y2="12" stroke="#aaa" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="14" y2="12" stroke="#aaa" stroke-width="3" stroke-linecap="round"/>
    <!-- O atom (red) -->
    <circle cx="0" cy="0" r="8" fill="#ff3333"/>
    <text x="0" y="4" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#fff">O</text>
    <!-- H atoms (white) -->
    <circle cx="-14" cy="12" r="5.5" fill="#e8e8e8"/>
    <text x="-14" y="15.5" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#333">H</text>
    <circle cx="14" cy="12" r="5.5" fill="#e8e8e8"/>
    <text x="14" y="15.5" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#333">H</text>
  </g>
</svg>
