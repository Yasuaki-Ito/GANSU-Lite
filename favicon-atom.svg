<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#g2)"/>
  <!-- Atom: 3 elliptical orbits + nucleus -->
  <g transform="translate(32,32)">
    <ellipse rx="20" ry="8" fill="none" stroke="#4ec9b0" stroke-width="1.8" opacity="0.8"/>
    <ellipse rx="20" ry="8" fill="none" stroke="#4fc1ff" stroke-width="1.8" opacity="0.8" transform="rotate(60)"/>
    <ellipse rx="20" ry="8" fill="none" stroke="#c586c0" stroke-width="1.8" opacity="0.8" transform="rotate(-60)"/>
    <circle r="4.5" fill="#ff6b6b"/>
    <circle r="2.5" fill="#ffd93d"/>
  </g>
</svg>
